x-document-info:
  original-document: ME_Account_Updater_API_Spec_March2024.pdf
  publication-date: March 2024
  version: '3.0'
  conversion-notes: |
    **Issues identified and corrected in this conversion:**

    1. **CRITICAL - Duplicate userPass property (Lines 92-100 in original):** The original YAML
       had userPass defined twice in the upload request schema. This is invalid YAML/OpenAPI.
       Fixed by removing the duplicate definition.

    2. **Missing reqfName_n in status example:** The status inquiry response example was
       missing the reqfName_n parameter that is documented in the PDF (Page 11).
       Added to examples.

    3. **Response detail record character count:** Original stated "126 characters" but
       correct calculation per PDF Page 7-8 is 124 characters
       (2+4+32+4+4+32+4+8+2+32=124). Corrected.

    4. **Missing maxLength for statusFilter:** PDF specifies 16 character max length.
       Added maxLength: 16 to the parameter schema.

    5. **Missing response schemas:** Added proper schemas (UploadResponse, StatusResponse,
       ErrorResponse) to document the URL-encoded response parameters per PDF.

    6. **Download response ambiguity:** Clarified that download returns either file data
       (with Content-Disposition header) OR error response, and client must detect which.

    **Note on PDF Page 12:** The source PDF has a heading "Upload file response parameters"
    in the Download section, which appears to be a documentation error in the original.
    The table content is correct for download error responses.
