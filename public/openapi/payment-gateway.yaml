openapi: 3.0.3
info:
  title: MerchantE Payment Gateway API
  description: "The MerchantE Payment Gateway API lets merchants and resellers process\
    \ live credit card transactions.\n\n**Key Features:**\n- Process credit card payments\
    \ (Sale, Pre-Authorization, Capture, Refund, Void)\n- Store card information securely\
    \ (Card on File / Tokenization)\n- Support for Card Present and Card Not Present\
    \ transactions\n- Address Verification Service (AVS) and CVV2 verification\n-\
    \ Level 3 processing for commercial and purchase cards\n- Support for Apple Pay\
    \ and Google Pay\n- International currency processing\n\n**Security:**\n- All\
    \ requests must use HTTPS protocol and POST requests\n- Follow PCI DSS compliance\
    \ requirements\n- Do not store CVV2 codes or full track data\n\n**Base URL:**\n\
    - Production: `https://api.merchante-solutions.com/mes-api/tridentApi`\n- Certification/Testing:\
    \ `https://cert.merchante-solutions.com/mes-api/tridentApi`\n\n**Authentication:**\n\
    All requests require `profile_id` and `profile_key` credentials issued by MerchantE.\n\
    These are passed as form parameters in the request body, NOT as headers.\n\n---\n\
    \n## Getting Started - Testing\n\n### 1. Obtain Test Credentials\n- Visit http://developer.merchante.com\n\
    - Submit the certification request form\n- Receive test credentials via email\
    \ within 24-48 hours\n- You will receive:\n  - `profile_id`: 20-digit merchant\
    \ ID\n  - `profile_key`: 32-character API password\n\n### 2. Configure Your Client\n\
    - Base URL: `https://cert.merchante-solutions.com/mes-api/tridentApi`\n- Method:\
    \ POST\n- Content-Type: `application/x-www-form-urlencoded`\n- Include `profile_id`\
    \ and `profile_key` in EVERY request body\n\n### 3. Test Card Numbers\nUse these\
    \ card numbers in the certification environment:\n\n**Visa:**\n- `4012301230121237`\
    \ - Standard approval\n- `4012301230121245` - Approval for amounts < $100\n\n\
    **Mastercard:**\n- `5424000000000015` - Standard approval\n\n**Discover:**\n-\
    \ `6011000000000012` - Standard approval\n\n**American Express:**\n- `371449635398431`\
    \ - Standard approval (4-digit CVV)\n\n### 4. Test AVS Responses\nUse specific\
    \ ZIP codes to trigger AVS responses:\n- `10001` = Match\n- `10002` = No Match\n\
    - `10003` = Service Not Available\n\n### 5. Test CVV Responses\n- `999` = Match\n\
    - `998` = No Match\n- `997` = Not Processed\n\n### 6. Amount-Driven Testing\n\
    Submit specific amounts to trigger responses:\n- `1.00` = Approval\n- `2.00` =\
    \ Decline (Insufficient Funds)\n- `3.00` = Call for Authorization\n\n### 7. Partial\
    \ Authorization Testing\n- Include `rctl_partial_auth=Y` in request\n- System\
    \ will approve 1/3 of requested amount\n\n---\n\n## Quick Start Example\n\n```bash\n\
    # Simple Sale Transaction (Certification Environment)\ncurl -X POST https://cert.merchante-solutions.com/mes-api/tridentApi\
    \ \\\n  -H \"Content-Type: application/x-www-form-urlencoded\" \\\n  -d \"profile_id=YOUR_PROFILE_ID\"\
    \ \\\n  -d \"profile_key=YOUR_PROFILE_KEY\" \\\n  -d \"transaction_type=D\" \\\
    \n  -d \"card_number=4012301230121237\" \\\n  -d \"card_exp_date=1225\" \\\n \
    \ -d \"transaction_amount=10.00\" \\\n  -d \"account_data_source=@\"\n```\n\n\
    **Expected Response:**\n```\ntransaction_id=7f84a42eeb393eafb76b327ec62eb693&error_code=000&auth_response_text=Approval+T40792&auth_code=T40792&avs_result=0\n\
    ```\n\n---\n\n## Important Notes\n\n\u26A0\uFE0F **Production vs Certification:**\n\
    - Use ONLY test profile credentials in certification environment\n- Certification\
    \ transactions are NOT settled and do NOT charge cards\n- Production profile credentials\
    \ used in testing WILL result in actual charges\n- Always verify you're using\
    \ the correct environment URL\n\n\u26A0\uFE0F **PCI Compliance:**\n- Never log\
    \ or store full card numbers in your systems\n- Do not store CVV2/CVC codes after\
    \ authorization\n- Do not store full magnetic stripe data\n- Use tokenization\
    \ (Store Card) for recurring transactions\n\n\u26A0\uFE0F **Rate Limits:**\n-\
    \ No specific rate limits documented\n- Use reasonable request rates during testing\n\
    - Contact MerchantE if you need high-volume testing"
  version: March 2024
  contact:
    name: MerchantE Support
    url: http://developer.merchante.com
  termsOfService: https://www.pcisecuritystandards.org/
servers:
- url: https://cert.merchante-solutions.com/mes-api
  description: Test Environment
tags:
- name: Sales
  description: Sale and payment transactions
- name: Authorization
  description: Pre-authorization operations
- name: Capture
  description: Settlement and capture operations
- name: Refunds
  description: Refund and credit operations
- name: Voids
  description: Void operations
- name: Tokens
  description: Card tokenization and storage
- name: Recurring
  description: 'Recurring subscription and installment payments using Card on File.


    **Card on File (CoF) Transactions:**

    Recurring payments require Card on File credentials and must include specific fields to indicate the transaction type:


    - `card_on_file=Y` - Indicates this is a CoF transaction

    - `account_data_source=@` - Credentials obtained from file (not from cardholder)

    - `merchant_initiated=Y` - Merchant-initiated transaction (MIT)

    - `transaction_id` - Reference to initial authorization when cardholder was present


    **SIT vs MIT:**


    - **CIT (Cardholder-Initiated Transaction / SIT):** Initial transaction where cardholder is present and provides credentials. Do NOT include `merchant_initiated` field.

    - **MIT (Merchant-Initiated Transaction):** Subsequent recurring charges where merchant initiates payment using stored credentials. Include `merchant_initiated=Y`.


    **moto_ecommerce_ind Values:**


    - `M103` = Recurring/Subscription payment

    - `M104` = Recurring/Installment payment'
- name: Verification
  description: Card verification operations
- name: Inquiry
  description: Transaction inquiry
- name: Card on File
  description: Card on File (CoF) operations
paths:
  /tridentApi:
    post:
      summary: Process payment transaction
      description: 'Main endpoint for processing various types of payment transactions.

        Transaction type is determined by the `transaction_type` parameter.


        **Transaction Types:**

        - D = Sale

        - P = Pre-Authorization

        - S = Capture/Settlement

        - J = Re-Authorization

        - U = Refund

        - C = Credit

        - V = Void

        - A = Verification

        - T = Store Card (Temporary Token)

        - X = Delete Stored Card

        - Z = Batch Close

        - I = Inquiry

        - 3DT = 3DS Authentication



        Note: This API is submitted as application/x-www-form-urlencoded to the Trident
        endpoint. Use the request examples for each transaction_type and follow the
        Required/Recommended/Others grouping in each request schema.'
      tags:
      - Sales
      - Authorization
      - Capture
      - Refunds
      - Voids
      - Tokens
      - Verification
      - Inquiry
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
              - $ref: '#/components/schemas/SaleRequest'
              - $ref: '#/components/schemas/PreAuthorizationRequest'
              - $ref: '#/components/schemas/CaptureRequest'
              - $ref: '#/components/schemas/RefundRequest'
              - $ref: '#/components/schemas/CreditRequest'
              - $ref: '#/components/schemas/VoidRequest'
              - $ref: '#/components/schemas/VerificationRequest'
              - $ref: '#/components/schemas/TemporaryTokenRequest'
              - $ref: '#/components/schemas/DeleteCardRequest'
              - $ref: '#/components/schemas/InquiryRequest'
              - $ref: '#/components/schemas/ReAuthorizationRequest'
              discriminator:
                propertyName: transaction_type
                mapping:
                  D: '#/components/schemas/SaleRequest'
                  P: '#/components/schemas/PreAuthorizationRequest'
                  S: '#/components/schemas/CaptureRequest'
                  U: '#/components/schemas/RefundRequest'
                  C: '#/components/schemas/CreditRequest'
                  V: '#/components/schemas/VoidRequest'
                  A: '#/components/schemas/VerificationRequest'
                  T: '#/components/schemas/TemporaryTokenRequest'
                  X: '#/components/schemas/DeleteCardRequest'
                  I: '#/components/schemas/InquiryRequest'
                  J: '#/components/schemas/ReAuthorizationRequest'
            examples:
              sale:
                summary: Card Not Present Sale
                description: Basic sale transaction with AVS and CVV verification
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: D
                  account_data_source: '@'
                  card_number: '4012301230121237'
                  card_exp_date: '1225'
                  cvv2: '999'
                  transaction_amount: '10.00'
                  cardholder_street_address: 123 Main St
                  cardholder_zip: '10001'
                  moto_ecommerce_ind: '7'
              saleWithToken:
                summary: Sale Using Stored Token
                description: Process sale using previously stored card token
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: D
                  card_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                  transaction_amount: '25.50'
                  card_on_file: Y
                  moto_ecommerce_ind: '7'
                  account_data_source: '@'
              saleWithInvoice:
                summary: Sale With Invoice and Tax
                description: Complete sale with invoice number, tax, and shipping
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: D
                  account_data_source: '@'
                  card_number: '5424000000000015'
                  card_exp_date: '1225'
                  cvv2: '999'
                  transaction_amount: '108.50'
                  tax_amount: '8.50'
                  shipping_amount: '10.00'
                  invoice_number: INV-2024-001
                  purchase_order: PO-12345
                  moto_ecommerce_ind: '7'
              preauth:
                summary: Pre-Authorization
                description: Authorize payment without capturing (e.g., hotel check-in)
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: P
                  account_data_source: '@'
                  card_number: '4012301230121237'
                  card_exp_date: '1225'
                  cvv2: '999'
                  transaction_amount: '100.00'
                  cardholder_street_address: 456 Oak Ave
                  cardholder_zip: '10001'
                  moto_ecommerce_ind: '7'
              capture:
                summary: Capture Pre-Authorization
                description: Settle previously authorized transaction
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: S
                  transaction_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                  transaction_amount: '100.00'
                  invoice_number: INV-2024-002
              partialCapture:
                summary: Partial Capture
                description: Capture less than the authorized amount
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: S
                  transaction_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                  transaction_amount: '75.00'
              refund:
                summary: Refund Transaction
                description: Refund a settled transaction (full or partial)
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: U
                  transaction_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                  transaction_amount: '12.30'
                  retry_id: REFUND001
              credit:
                summary: Standalone Credit
                description: Credit a card without referencing an original sale (e.g., refund for returned merchandise purchased with cash)
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: C
                  account_data_source: '@'
                  card_number: '4012301230121237'
                  card_exp_date: '1225'
                  cvv2: '999'
                  transaction_amount: '25.00'
                  cardholder_street_address: 123 Main St
                  cardholder_zip: '10001'
                  moto_ecommerce_ind: '7'
                  invoice_number: INV-2024-CREDIT-001
              void:
                summary: Void Transaction
                description: Cancel a transaction before settlement
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: V
                  transaction_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                  moto_ecommerce_ind: '7'
              storeCardPermanent:
                summary: Create Permanent Token (store_card=Y on Sale)
                description: Request a permanent token (card_id) to store customer
                  credentials for future transactions. Permanent tokenization is done
                  via store_card=Y (not via transaction_type=T).
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: D
                  account_data_source: '@'
                  card_number: '4012301230121237'
                  card_exp_date: '1225'
                  cvv2: '999'
                  transaction_amount: '15.00'
                  store_card: Y
                  moto_ecommerce_ind: '7'
              deleteCard:
                summary: Delete Stored Card
                description: Remove a permanently stored card token
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: X
                  card_id: 8fc94e10b12130f4ab8a8ceeac40fc69
              verification:
                summary: Card Verification
                description: Verify card without charging (AVS and CVV check)
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: A
                  account_data_source: '@'
                  card_number: '4012301230121237'
                  card_exp_date: '1225'
                  cvv2: '999'
                  transaction_amount: '0.00'
                  cardholder_street_address: 789 Pine Rd
                  cardholder_zip: '10001'
                  moto_ecommerce_ind: Z
              inquiry:
                summary: Transaction Inquiry
                description: Query status of transaction by retry_id
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: I
                  retry_id: REFUND001
              recurringPayment:
                summary: Recurring Payment (Installment 2 of 12)
                description: Process installment payment with Card on File
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: D
                  card_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                  transaction_amount: '49.99'
                  card_on_file: Y
                  account_data_source: '@'
                  merchant_initiated: Y
                  moto_ecommerce_ind: M104
                  payment_count: '2'
                  recurring_payment_count: '12'
              recurringSubscription:
                summary: Recurring Subscription Payment
                description: Process subscription-based recurring payment with Card on File
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: D
                  card_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                  transaction_amount: '49.99'
                  card_on_file: Y
                  account_data_source: '@'
                  merchant_initiated: Y
                  moto_ecommerce_ind: M103
              recurringInstallment:
                summary: Recurring Installment Payment (2 of 12)
                description: Process installment-based recurring payment with Card on File
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: D
                  card_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                  transaction_amount: '99.99'
                  card_on_file: Y
                  account_data_source: '@'
                  merchant_initiated: Y
                  moto_ecommerce_ind: M104
                  payment_count: '2'
                  recurring_payment_count: '12'
              surcharge:
                summary: Sale with Surcharge
                description: Add surcharge fee to credit card transaction
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: D
                  account_data_source: '@'
                  card_number: '537143000000001'
                  card_exp_date: '1225'
                  transaction_amount: '36.05'
                  tran_fee_amount: '1.05'
                  moto_ecommerce_ind: '7'
              temporaryToken:
                summary: Create Temporary Token (transaction_type=T)
                description: Store a card for one-time use. The response transaction_id
                  becomes card_id for a temporary token. Temporary tokens expire after
                  one use or 30 minutes.
                value:
                  profile_id: YOUR_PROFILE_ID_HERE
                  profile_key: YOUR_PROFILE_KEY_HERE
                  transaction_type: T
                  card_number: '4012301230121237'
                  card_exp_date: '1225'
      responses:
        '200':
          description: Successful transaction response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              examples:
                saleApproved:
                  summary: Sale Approved
                  value:
                    transaction_id: 5fc24a2abe160c232a6dccd72ed8c5ba
                    error_code: '000'
                    auth_response_text: Approval T02786
                    avs_result: '0'
                    cvv2_result: M
                    auth_code: T02786
                preauthApproved:
                  summary: Pre-Authorization Approved
                  value:
                    transaction_id: 0ac2bda47da574489dfe428ef30b3339
                    error_code: '000'
                    auth_response_text: Approval T78243
                    avs_result: '0'
                    auth_code: T78243
                    cvv2_result: M
                captureAccepted:
                  summary: Capture Accepted
                  value:
                    transaction_id: 173d3dcc1064e668deba383d2b2f90f8
                    error_code: '000'
                    auth_response_text: Settle Request Accepted
                refundAcceptedAdjustment:
                  summary: Refund Accepted (Adjustment)
                  value:
                    transaction_id: 38356d5c6625379a9b3e55920f5f9e8a
                    error_code: '000'
                    auth_response_text: Refund Request Accepted - Adjustment $0.40
                refundResultingCredit:
                  summary: Refund Resulting in a Credit
                  value:
                    transaction_id: 9dedb6066dac3d0db45d07d80e6feab2
                    error_code: '000'
                    auth_response_text: Refund Request Accepted - Credit $5.00
                    avs_result: '0'
                    auth_code: '750670'
                creditApproved:
                  summary: Credit Approved
                  value:
                    transaction_id: be7c5c8a61d73c31b7bbca308e508b14
                    error_code: '000'
                    auth_response_text: Credit Approved
                    avs_result: '0'
                    auth_code: '689420'
                voidAccepted:
                  summary: Void Accepted
                  value:
                    transaction_id: 03c7704b2339f7e5d57e125c12a47023
                    error_code: '000'
                    auth_response_text: Void Request Accepted
                verifyApproved:
                  summary: Verification Approved
                  value:
                    transaction_id: 8fc94e10b12130f4ab8a8ceeac40fc69
                    error_code: '000'
                    auth_response_text: Approval T95060
                    avs_result: '0'
                    cvv2_result: M
                    auth_code: T95060
                temporaryTokenCreated:
                  summary: Temporary Token Created
                  value:
                    transaction_id: fe88e5f9cc1a42d5dcabc278b14c95cf
                    error_code: '000'
                    auth_response_text: Card Stored
                permanentTokenCreated:
                  summary: Permanent Token Created (store_card=Y)
                  value:
                    transaction_id: 6cd0c94e693939d4c2fd1fdfdf4ba018
                    error_code: '000'
                    auth_response_text: Approval T31145
                    avs_result: '0'
                    auth_code: T31145
                    card_id: de2072a20064328c89fe1c84a8355819
                tokenDeleted:
                  summary: Permanent Token Deleted
                  value:
                    transaction_id: 3520824992915250a09fd50c73ee10dd
                    error_code: '000'
                    auth_response_text: Card Removed
                reauthDeclinedExample:
                  summary: Re-Authorization Declined Example
                  value:
                    transaction_id: 09e3ea944c035b4c629221c48caa82b9
                    error_code: '005'
                    auth_response_text: Do Not Honor
        '400':
          description: Bad request - invalid parameters
        '401':
          description: Unauthorized - invalid credentials
        '500':
          description: Server error
      operationId: submitTridentTransaction
components:
  schemas:
    BaseRequest:
      type: object
      required:
      - profile_id
      - profile_key
      - transaction_type
      properties:
        profile_id:
          type: string
          description: ID issued by MerchantE
          example: '94100099999900000001'
          maxLength: 20
          pattern: ^\d{20}$
        profile_key:
          type: string
          description: API password assigned by MerchantE
          example: FhcOqsIRkbrsvhlqMgweJHmnLhdnJAwk
          maxLength: 32
        transaction_type:
          type: string
          description: 'Transaction type (value depends on the endpoint being called)'
          - F
          maxLength: 3
    CardInformation:
      type: object
      properties:
        card_number:
          type: string
          description: Payment card number. Do not send if using card_id or card_swipe.
          example: '4012301230158'
          minLength: 5
          maxLength: 22
          pattern: ^\d{5,22}$
        card_id:
          type: string
          description: Stored customer card information (token from Store Card request)
          example: 8fc94e10b12130f4ab8a8ceeac40fc69
          maxLength: 32
        card_swipe:
          type: string
          description: Contents of payment card read by electronic device. Always
            processed as card-present.
        card_exp_date:
          type: string
          description: Card expiration date, submit as MMYY. Required when using card_number.
          example: '1225'
          pattern: ^\d{4}$
          maxLength: 4
        cvv2:
          type: string
          description: 'Card Verification Value:

            - Visa: CVV2

            - Mastercard: CVC2

            - Discover: CID

            - American Express: CID (4 digits)

            '
          example: '123'
          minLength: 3
          maxLength: 4
          pattern: ^\d{3,4}$
    CardholderInformation:
      type: object
      properties:
        cardholder_name:
          type: string
          description: Cardholder's full name
          example: John Smith
          maxLength: 64
        cardholder_first_name:
          type: string
          description: Cardholder first name
          example: John
          maxLength: 15
        cardholder_last_name:
          type: string
          description: Cardholder last name
          example: Smith
          maxLength: 30
        cardholder_street_address:
          type: string
          description: First 19 characters of cardholder's billing address
          example: 123 Main Street
          maxLength: 19
        cardholder_zip:
          type: string
          description: Cardholder's ZIP code (5 or 9 digits)
          example: '10453'
          pattern: ^\d{5}(\d{4})?$
        cardholder_city:
          type: string
          description: Cardholder's city
          example: New York
          maxLength: 20
        cardholder_state:
          type: string
          description: Cardholder's state (2-letter code)
          example: NY
          maxLength: 2
        cardholder_country:
          type: string
          description: Cardholder's country code
          example: US
          maxLength: 2
        cardholder_email:
          type: string
          format: email
          description: Cardholder's billing email
          example: jsmith@email.com
          maxLength: 60
        cardholder_phone:
          type: string
          description: Cardholder's billing phone (digits only, no dashes)
          example: '8005550101'
          pattern: ^\d{10}$
          maxLength: 10
    CardOnFileFields:
      type: object
      description: Card on File / Stored Credential fields required for CoF transactions
      properties:
        card_on_file:
          type: string
          description: Indicates if the transaction is a card on file transaction
          enum:
          - Y
          - N
          maxLength: 1
        cit_mit_indicator:
          type: string
          description: 'Card on File transaction indicator (Mastercard):


            Cardholder-Initiated:

            - C101 = Credential-on-File (ad-hoc)

            - C102 = Standing Order (variable amount and fixed frequency)

            - C103 = Subscription (fixed amount and frequency)

            - C104 = Installment (single purchase with known amount and set frequency)


            Merchant-Initiated Recurring/Installment:

            - M101 = Unscheduled Credential-on-File (variable amount, no regular intervals)

            - M102 = Standing Order (variable amount and fixed frequency at regular
            intervals)

            - M103 = Subscription (fixed amount and frequency)

            - M104 = Installment (single purchase with known amount and set frequency)


            Merchant-Initiated Industry Practice:

            - M205 = Partial Shipment

            - M206 = Related/Delayed Charge

            - M207 = No Show Charge

            - M208 = Resubmission

            '
          enum:
          - C101
          - C102
          - C103
          - C104
          - M101
          - M102
          - M103
          - M104
          - M205
          - M206
          - M207
          - M208
          maxLength: 4
        store_card:
          type: string
          description: Store card for future use (creates permanent token)
