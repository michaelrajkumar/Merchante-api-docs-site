      allOf:
      - $ref: '#/components/schemas/BaseRequest'
      - type: object
        required:
        - card_number
        properties:
          transaction_type:
            type: string
            description: 'Temporary Token (T)'
            enum:
            - T
            example: T
          card_number:
            type: string
            description: Payment card number
            example: '4012301230158'
            minLength: 5
            maxLength: 22
            pattern: ^\d{5,22}$
          card_exp_date:
            type: string
            description: Card expiration date, submit as MMYY
            example: '1225'
            pattern: ^\d{4}$
            maxLength: 4
      x-parameterGroups:
      - name: Required
        fields:
        - profile_id
        - profile_key
        - transaction_type
        - card_number
      - name: Recommended
        fields:
        - card_exp_date
