    BusinessCheckingAccount:
      type: object
      description: |
        Business Checking Account information.
        
        **DDA Type Rules:**
        - Only one Deposit Type account allowed per application
        - Only one Chargeback Type account allowed per application
        - Only one Fee Type account allowed per application
        - Multiple types can be assigned to a single account using semicolon separator (e.g., "fees;Deposit")
      required:
        - attributes
        - Bank_Name__c
        - Bank_Street_Address__c
        - Bank_City__c
        - Bank_State__c
        - Bank_Zipcode__c
        - Checking_Account__c
        - Transit_Routing__c
        - Years_Open__c
        - DDA_Type__c
      properties:
        attributes:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - Business_Checking_Account__c
        Bank_Name__c:
          type: string
          description: Name of the bank
          maxLength: 255
        Bank_Street_Address__c:
          type: string
          description: Bank street address
          maxLength: 255
        Bank_City__c:
          type: string
          description: Bank city
          maxLength: 100
        Bank_State__c:
          type: string
          description: Bank state (2-letter code or full state name)
          maxLength: 100
          enum:
            - AK
            - AL
            - AR
            - AZ
            - CA
            - CO
            - CT
            - DC
            - DE
            - FL
            - GA
            - HI
            - IA
