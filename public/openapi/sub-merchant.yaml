            - IL
            - IN
            - KS
            - KY
            - LA
            - MA
            - MD
            - ME
            - MI
            - MN
            - MO
            - MS
            - MT
            - NC
            - ND
            - NE
            - NH
            - NJ
            - NM
            - NV
            - NY
            - OH
            - OK
            - OR
            - PA
            - PR
            - RI
            - SC
            - SD
            - TN
            - TX
            - UT
            - VA
            - VT
            - WA
            - WI
            - WV
            - WY
        Bank_Zipcode__c:
          type: string
          description: Bank ZIP code
          maxLength: 20
        Checking_Account__c:
          type: string
          description: Bank checking account number
          maxLength: 100
        Transit_Routing__c:
          type: string
          description: Bank transit routing number (9 digits)
          maxLength: 100
          pattern: '^\d{9}$'
        Years_Open__c:
          type: integer
          description: Number of years account has been open
          minimum: 0
        DDA_Type__c:
          type: string
          description: |
            Account type - Multi-picklist with values: Deposit, Chargeback, Fees.
            Multiple values can be specified with semicolon separator (e.g., "fees;Deposit").
            Only one of each type allowed per application.
          maxLength: 4099
          example: "Deposit"
        Checking_Account_Unique_Field__c:
          type: string
          description: Unique identifier for multiple checking accounts in same request. Used in response SourceId to identify which account the response refers to.
          maxLength: 3
