openapi: 3.0.3
info:
  title: MerchantE Sub-Merchant API
  description: |
    The MerchantE Sub-Merchant API provides a route for Payment Facilitators (PayFacs) to onboard new sub-merchants to their platform. 
    
    This is a streamlined version of the onboarding process which automatically populates many fields, requiring manual entry of far fewer fields in the application. The issuance of a sub-merchant MID is quickly accomplished following the standard risk assessment procedure.
    
    MerchantE offers two options for PayFacs depending on the underwriting provider:
    - **PayFac-as-a-Service (PaaS)**: MerchantE underwrites the transactions and acts as the payment processor
    - **Wholesale PayFac (WP)**: The Payment Facilitator provides outside underwriting, normally done in conjunction with a sponsor bank
    
    **Important Notes:**
    - Auth token is valid for 24 hours
    - File attachment size limit: 100 MB
    - Updates to applications in "Pending Underwriting" or "Closed Won" stages are not allowed
    - All timestamps are in ISO 8601 format
    
    **Documentation Resources:**
    - Technical documentation and SDK libraries: https://developer.merchante.com
    - PCI Security Standards Council: https://www.pcisecuritystandards.org/
    - NAICS lookup: https://www.census.gov/econ/isp/
  version: 1.0.0
  contact:
    name: MerchantE Partner Support
    url: https://www.merchante.com
  x-logo:
    url: 'https://www.merchante.com/logo.png'
    altText: MerchantE Logo

servers:
  - url: https://test.salesforce.com
    description: Certification/Sandbox Authentication Server
  - url: https://merchante-solutions--cert.my.salesforce.com
    description: Certification API Server (use instance_url from auth response)

tags:
  - name: Authentication
    description: OAuth 2.0 authentication endpoints
  - name: Applications
    description: Create and update sub-merchant applications
  - name: Attachments
    description: Upload supporting documents
  - name: Status
    description: Check application status

security:
  - OAuth2: []

paths:
  /services/oauth2/token:
    post:
      tags:
        - Authentication
      summary: Get OAuth 2.0 Access Token
      description: |
        Generate an access token for API authentication. The token is valid for 24 hours.
        
        **Authentication Flow:**
        1. Send credentials to this endpoint to receive access_token
        2. Use access_token as Bearer token (Type: OAUTH 2.0) in Authorization header for all subsequent requests
        3. Token expires after 24 hours - obtain new token when expired
        
        **Note:** The request URL depends on the environment:
        - Production: https://login.salesforce.com/services/oauth2/token
        - Certification: https://test.salesforce.com/services/oauth2/token
      operationId: getAuthToken
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
                - client_id
                - client_secret
                - username
                - password
              x-parameterGroups:
                - name: Required
                  fields:
                    - grant_type
                    - client_id
                    - client_secret
                    - username
                    - password
              properties:
                grant_type:
                  type: string
                  enum:
                    - password
                  description: OAuth 2.0 grant type - must be literal "password" text
                  example: "password"
                client_id:
                  type: string
                  description: Client ID provided by MerchantE (different for each sandbox/org)
                  example: "xxxXXXXX"
                client_secret:
                  type: string
                  format: password
                  description: Client secret provided by MerchantE (different for each sandbox/org)
                  example: "xxxXXX"
                username:
                  type: string
                  description: API username provided by MerchantE (different for each sandbox/org)
                  example: "partnerportalapi@merchante.com.cert"
                password:
                  type: string
                  format: password
                  description: Password concatenated with Security Token ({{Password+Security_Token}}). Security Token is not always required depending on org configuration.
            example:
              grant_type: "password"
              client_id: "xxxXXXXX"
              client_secret: "xxxXXX"
              username: "partnerportalapi@merchante.com.cert"
              password: "xxx"
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              example:
                access_token: "your_access_token_here"
                instance_url: "https://merchante-solutions--cert.my.salesforce.com"
                id: "https://test.salesforce.com/id/00D010000004dsTEAQ/00501000002KdrmAAC"
                token_type: "Bearer"
                issued_at: "1649432850703"
                signature: "Z1lxdqcdfOZMCjuICOTjYYbmklGrYE9xbYn5ZJ/BjNA="
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /services/apexrest/merchant-application-payfac/:
    post:
      tags:
        - Applications
      summary: Create or Update Sub-Merchant Application
      description: |
        Create a new sub-merchant application or update an existing one. Both create and update operations use POST method.
        
        **For Create Operations:**
        - Omit the `Id` field from Opp and Mer objects
        - All required fields must be provided
        - At least one Primary Contact/Beneficial Owner must be identified
        
        **For Update Operations:**
        - Include the `Id` field (Opportunity SFID) in the Opp object
        - Include the `Id` field (Account SFID) in the Mer object
        - Source ID can be used to relate SFID to corresponding fields
        - Updates to applications in "Pending Underwriting" or "Closed Won" stages are NOT allowed
        
        **Important Guidelines:**
        - Contact/Beneficial Owner fields required based on Legal Entity Type/Ownership
        - Set `Is_ME_Underwriting__c` to indicate underwriting type:
          - `true`: MerchantE is underwriting (PayFac-as-a-Service)
          - `false`: External underwriter (Wholesale PayFac)
        
        **Data Sections:**
        - Merchant Information (Mer)
        - Checking Account (lstbussCheckAcc - can have multiple with different DDA Types)
        - Beneficial Owners (lstContact)
        - Transaction Payment Options (Opp)
        
        **Validation Notes:**
        - Phone numbers must be 10 digits or (999) 999-9999 format
        - ZIP codes must be 5 digits
        - Federal Tax ID must be 9 digits
        - SSN must be 9 digits
        - Transit Routing Number must be 9 digits
        
        **Note:** The host may be different for each organization. Use instance_url from Authorization Token response.
      operationId: createOrUpdateApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
            examples:
              createApplication:
                summary: Create New Application
                description: Example request to create a new sub-merchant application
                value:
                  Opp:
                    attributes:
                      type: "Opportunity"
                    Is_ME_Underwriting__c: true
                  Mer:
                    attributes:
                      type: "Account"
                    Association_ID_API_Field__c: "3941803045"
                    Legal_Name__c: "test legal name 1111"
                    Tax_ID__c: "333333333"
                    State_of_Entity_Formation_Incorporation__c: "CA"
                    Name: "Test Account"
                    BillingStreet: "123 test"
                    BillingCity: "San Jose"
                    BillingState: "California"
                    BillingPostalCode: "99999"
                    BillingCountry: "united states"
                    Phone: "(444) 555-6666"
                    App_Email__c: "test@mes.com"
                    Website: "www.mes.com"
                    Customer_Service_Phone__c: "888-888-8888"
                    Industry: "Retail"
                    Industry_other__c: "test other"
                    Location_Type__c: "Ecommerce"
                    Location_Other__c: "test other"
                    Ownership: "Government"
                    Years_at_Location__c: "3"
                    Date_Established__c: "2000-12-10"
                    Chain_Non_Chain__c: "Single Outlet"
                    Description: "Test description"
                    MCC_API_Field__c: "5045"
                    Ever_accepted_credit_cards_before__c: true
                    Ever_had_a_merchant_account_canceled__c: true
                  lstbussCheckAcc:
                    - attributes:
                        type: "Business_Checking_Account__c"
                      Bank_Name__c: "Wells Fargo"
                      Bank_Street_Address__c: "First street"
                      Bank_City__c: "San Francisco"
                      Bank_State__c: "California"
                      Bank_Zipcode__c: "11111"
                      Checking_Account__c: "1212121212"
                      Transit_Routing__c: "121233333"
                      Years_Open__c: 4
                      DDA_Type__c: "Chargeback"
                      Checking_Account_Unique_Field__c: "111"
                    - attributes:
                        type: "Business_Checking_Account__c"
                      Bank_Name__c: "Wells Fargo"
                      Bank_Street_Address__c: "First street"
                      Bank_City__c: "San Francisco"
                      Bank_State__c: "California"
                      Bank_Zipcode__c: "11111"
                      Checking_Account__c: "1212121222"
                      Transit_Routing__c: "121212121"
                      Years_Open__c: 4
                      DDA_Type__c: "fees;Deposit"
                      Checking_Account_Unique_Field__c: "222"
              updateApplication:
                summary: Update Existing Application
                description: Example request to update an existing sub-merchant application
                value:
                  Opp:
                    attributes:
                      type: "Opportunity"
                    Id: "0068L000008IybaQAC"
                    Is_ME_Underwriting__c: true
                  Mer:
                    attributes:
                      type: "Account"
                    Id: "0018L00000E6XysQAF"
                    Legal_Name__c: "test legal name 1111"
                    Tax_ID__c: "333333333"
                    State_of_Entity_Formation_Incorporation__c: "CA"
                    Name: "Test Account"
                    BillingStreet: "123 test"
                    BillingCity: "San Jose"
                    BillingState: "California"
                    BillingPostalCode: "99999"
                    BillingCountry: "united states"
                    Phone: "(444) 555-6666"
                    App_Email__c: "test@mes.com"
                    Website: "www.mes.com"
                    Customer_Service_Phone__c: "888-888-8888"
                    Industry: "Retail"
                    Industry_other__c: "test other"
                    Location_Type__c: "Ecommerce"
                    Location_Other__c: "test other"
                    Ownership: "Government"
                    Years_at_Location__c: "3"
                    Date_Established__c: "2000-12-10"
                    Chain_Non_Chain__c: "Single Outlet"
                    Description: "Test description"
                    MCC_API_Field__c: "5045"
                    Ever_accepted_credit_cards_before__c: true
                    Ever_had_a_merchant_account_canceled__c: true
      responses:
        '200':
          description: Application created or updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                createResponse:
                  summary: Create Application Response
                  description: Response after successfully creating a new application
                  value:
                    - Success: true
                      SourceId: null
                      SFId: "0018L00000E6XysQAF"
                      ObjectType: "Account"
                      Message: "Merchant Information Created Successfully."
                    - Success: true
                      SourceId: null
                      SFId: "0068L000008IybaQAC"
                      ObjectType: "Opportunity"
                      Message: "Transaction/Payment Options Created Successfully."
                    - Success: true
                      SourceId: null
                      SFId: "0Q08L000000HKx0SAG"
                      ObjectType: "Quote"
                      Message: "Record Created Successfully."
                    - Success: true
                      SourceId: null
                      SFId: "0QL8L000000HPMWWA4"
                      ObjectType: "QuoteLineItem"
                      Message: "Solution & Fees Created Successfully."
                updateResponse:
                  summary: Update Application Response
                  description: Response after successfully updating an existing application
                  value:
                    - Success: true
                      SourceId: null
                      SFId: "0018L00000E6XysQAF"
                      ObjectType: "Account"
                      Message: "Merchant Information Updated Successfully."
                    - Success: true
                      SourceId: null
                      SFId: "0068L000008IybaQAC"
                      ObjectType: "Opportunity"
                      Message: "Transaction/Payment Options Updated Successfully."
                    - Success: true
                      SourceId: null
                      SFId: "0Q08L000000HKx0SAG"
                      ObjectType: "Quote"
                      Message: "Record Updated Successfully."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Update not allowed (application in Pending Underwriting or Closed Won stage)
        '404':
          description: Application not found (for update operations)
        '500':
          $ref: '#/components/responses/InternalServerError'

  /services/data/v54.0/composite/tree/Attachment:
    post:
      tags:
        - Attachments
      summary: Upload Attachments
      description: |
        Upload supporting documents for a sub-merchant application.
        
        **Requirements:**
        - Opportunity ID is required (ParentId field)
        - Files must be Base64 encoded
        - Maximum file size: 100 MB per file
        
        **Supported File Types:**
        - PDF documents
        - Images (JPEG, PNG, etc.)
        - Text files
        
        **Process:**
        1. Convert file to Base64
        2. Include ParentId (Opportunity ID from create response)
        3. Provide descriptive file name with extension
      operationId: createAttachment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachmentRequest'
            example:
              records:
                - attributes:
                    type: "Attachment"
                    referenceId: "attachment0"
                  ParentId: "00600000011111XXX"
                  Name: "File.pdf"
                  body: "base64Coded"
                - attributes:
                    type: "Attachment"
                    referenceId: "attachment1"
                  ParentId: "00100000011111XXX"
                  Name: "TestTXTFIle.txt"
                  body: "base64Coded"
      responses:
        '200':
          description: Attachments uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentResponse'
              example:
                hasErrors: false
                results:
                  - referenceId: "attachment0"
                    id: "00P8L000000qsJKUAY"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: File size exceeds 100 MB limit
        '500':
          $ref: '#/components/responses/InternalServerError'

  /services/apexrest/merchant-application-status/{opportunityId}:
    get:
      tags:
        - Status
      summary: Get Application Status
      description: |
        Retrieve the current status of a sub-merchant application using the Opportunity ID from the create/update response.
        
        **Response Varies By Type:**
        - **Wholesale PayFac**: Returns integration status and MID
        - **PayFac as a Service**: Returns detailed underwriting information including status, reason codes, timestamps, and AEX document IDs
        
        **Status Fields:**
        - Integration_Status__c: Success/Failed status
        - Integration_Message__c: Error details if failed
        - Integration_Failure_Stage__c: Stage where integration failed
        - MID__c: Merchant ID when approved
        - Underwriting_Status__c: Current underwriting state (PaaS only)
        
        **Note:** Use the access_token in the Authorization section of the request.
      operationId: getApplicationStatus
      x-parameterGroups:
        - name: Required
          fields:
            - opportunityId
      parameters:
        - name: opportunityId
          in: path
          required: true
          description: The Salesforce Opportunity ID (SFID) from the create/update response
          schema:
            type: string
            pattern: '^[a-zA-Z0-9]{15,18}$'
          example: "0065900000KPVt2AAH"
      responses:
        '200':
          description: Application status retrieved successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/WholesalePayFacStatusResponse'
                  - $ref: '#/components/schemas/PaaSStatusResponse'
              examples:
                wholesalePayFac:
                  summary: Wholesale PayFac Response
                  value:
                    Integration_Failure_Stage__c: "Error generating AppSeq"
                    Integration_Message__c: null
                    Integration_Status__c: "Failed"
                    MID__c: "14471729"
                    Id: "0065900000KPVt2AAH"
                payFacAsService:
                  summary: PayFac as a Service Response
                  value:
                    UW_Time_to_Approve_Decline__c: null
                    Underwriting_Approval_Date_Timestamp__c: null
                    Underwriting_Submission_Date_Timestamp__c: null
                    Underwriting_Submission_Date__c: null
                    Underwriting_Reason_Details__c: null
                    Underwriting_Reason_Code__c: null
                    Underwriter_Name__c: null
                    Change_Notes__c: null
                    AEX_Short_ID__c: null
                    AEX_Document_ID__c: null
                    Underwriting_Status__c: null
                    Integration_Failure_Stage__c: null
                    Integration_Message__c: null
                    Integration_Status__c: "Failed"
                    MID__c: "14471729"
                    Id: "0065900000JzHFdAAN"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Application not found
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: OAuth 2.0 authentication with password grant. Use Type "OAUTH 2.0" with the authorization header.
      flows:
        password:
          tokenUrl: /services/oauth2/token
          scopes: {}

  schemas:
    AuthTokenResponse:
      type: object
      required:
        - access_token
        - instance_url
        - id
        - token_type
        - issued_at
        - signature
      x-parameterGroups:
        - name: Common
          fields:
            - access_token
            - instance_url
            - token_type
        - name: When Provided
          fields:
            - id
            - issued_at
            - signature
      properties:
        access_token:
          type: string
          description: Bearer token for API authentication (valid for 24 hours)
        instance_url:
          type: string
          format: uri
          description: Base URL for all subsequent API calls. Use this URL as the host for create/update/status requests.
        id:
          type: string
          format: uri
          description: Identity URL for the authenticated user
        token_type:
          type: string
          enum:
            - Bearer
          description: Token type (always "Bearer")
        issued_at:
          type: string
          description: Unix timestamp (milliseconds) when token was issued
        signature:
          type: string
          description: HMAC-SHA256 signature for token validation

    ApplicationRequest:
      type: object
      required:
        - Opp
        - Mer
      x-parameterGroups:
        - name: Required
          fields:
            - Opp
            - Mer
            - lstContact
          description: Core application components - Opportunity details, Merchant information, and at least one Beneficial Owner/Contact
        - name: Recommended
          fields:
            - lstbussCheckAcc
          description: Business checking account information for deposit processing
        - name: Others
          fields: []
          description: Additional optional fields
      properties:
        Opp:
          $ref: '#/components/schemas/Opportunity'
        Mer:
          $ref: '#/components/schemas/Account'
        lstbussCheckAcc:
          type: array
          description: List of business checking accounts (supports multiple accounts with different DDA types)
          items:
            $ref: '#/components/schemas/BusinessCheckingAccount'
        lstContact:
          type: array
          description: List of beneficial owners and contacts
          items:
            $ref: '#/components/schemas/Contact'

    Opportunity:
      type: object
      required:
        - attributes
        - Is_ME_Underwriting__c
      properties:
        attributes:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - Opportunity
        Id:
          type: string
          description: Salesforce Opportunity ID (required for update operations, omit for create)
          pattern: '^[a-zA-Z0-9]{15,18}$'
        Is_ME_Underwriting__c:
          type: boolean
          description: |
            Indicates underwriting type:
            - true: MerchantE is underwriting (PayFac-as-a-Service)
            - false: External underwriter (Wholesale PayFac)
        High_Monthly_Volume__c:
          type: number
          format: double
          description: High monthly processing volume (optional)
          minimum: 0
        Avg_Ticket__c:
          type: number
          format: double
          description: Average transaction amount (formula/calculated field)
          readOnly: true
        High_Ticket__c:
          type: number
          format: double
          description: Highest single transaction amount (optional)
          minimum: 0
        Visa_MC_Discover_Volume__c:
          type: number
          format: double
          description: Monthly volume for Visa/MC/Discover (optional)
          minimum: 0
        Days_to_Ship_Deliver__c:
          type: string
          description: Delivery timeframe (optional, picklist)
          maxLength: 255
        Refund_Policy__c:
          type: string
          description: Merchant's refund policy (optional, picklist)
          maxLength: 255
      x-parameterGroups:
        - name: Required
          fields:
            - attributes
            - Is_ME_Underwriting__c
          description: Core fields required for all applications
        - name: Recommended
          fields:
            - High_Monthly_Volume__c
            - High_Ticket__c
            - Visa_MC_Discover_Volume__c
          description: Transaction volume information helps with accurate underwriting
        - name: Others
          fields:
            - Id
            - Avg_Ticket__c
            - Days_to_Ship_Deliver__c
            - Refund_Policy__c
          description: Optional fields for updates and additional business details

    Account:
      type: object
      description: |
        Merchant Information object. Contains demographic information about the merchant.
        
        **Required fields for both Wholesale PayFac (WP) and PayFac-as-a-Service (PaaS).**
      required:
        - attributes
        - Association_ID_API_Field__c
        - Legal_Name__c
        - Tax_ID__c
        - State_of_Entity_Formation_Incorporation__c
        - Name
        - BillingStreet
        - BillingCity
        - BillingState
        - BillingPostalCode
        - BillingCountry
        - Phone
        - App_Email__c
        - Website
        - Customer_Service_Phone__c
        - Industry
        - Location_Type__c
        - Ownership
        - Years_at_Location__c
        - Date_Established__c
        - Chain_Non_Chain__c
        - Description
        - MCC_API_Field__c
        - Ever_accepted_credit_cards_before__c
        - Ever_had_a_merchant_account_canceled__c
      properties:
        attributes:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - Account
        Id:
          type: string
          description: Salesforce Account ID (required for update operations, omit for create)
          pattern: '^[a-zA-Z0-9]{15,18}$'
        Association_ID_API_Field__c:
          type: string
          description: Association ID for the PayFac account (10 characters)
          maxLength: 10
          example: "3941803045"
        Legal_Name__c:
          type: string
          description: Legal business name
          maxLength: 100
          minLength: 1
        Tax_ID__c:
          type: string
          description: Federal Tax ID (EIN) - 9 digits, no hyphens
          maxLength: 16
          pattern: '^\d{9}$'
          example: "333333333"
        State_of_Entity_Formation_Incorporation__c:
          type: string
          description: State where business was formed/incorporated (picklist)
        Name:
          type: string
          description: Merchant DBA (Doing Business As) name / Account Name
          maxLength: 255
          minLength: 1
        BillingStreet:
          type: string
          description: Legal street address
          maxLength: 255
        BillingCity:
          type: string
          description: Legal city
          maxLength: 40
        BillingState:
          type: string
          description: Legal state/province code (picklist - see Location Codes in documentation)
          maxLength: 80
        BillingPostalCode:
          type: string
          description: Legal ZIP/Postal code (5 digits for US)
          maxLength: 20
          pattern: '^\d{5}$'
        BillingCountry:
          type: string
          description: Legal country code (picklist - see Location Codes in documentation)
          maxLength: 80
        Phone:
          type: string
          description: Business phone number (10 digits or (999) 999-9999 format)
          pattern: '^(\d{10}|\(\d{3}\) \d{3}-\d{4})$'
          example: "(444) 555-6666"
        App_Email__c:
          type: string
          format: email
          description: Application email address
          maxLength: 100
        Website:
          type: string
          format: uri
          description: Business website URL
          maxLength: 255
        Customer_Service_Phone__c:
          type: string
          description: Customer service phone number (10 digits or (999) 999-9999 format)
          pattern: '^(\d{10}|\(\d{3}\) \d{3}-\d{4})$'
        Industry:
          type: string
          description: Business industry classification (picklist)
          maxLength: 255
        Industry_other__c:
          type: string
          description: Other industry description (if Industry is "Other")
          maxLength: 100
        Location_Type__c:
          type: string
          description: Type of business location (picklist)
          maxLength: 255
        Location_Other__c:
          type: string
          description: Other location type description
          maxLength: 255
        Ownership:
          type: string
          description: |
            Legal entity type (picklist). Determines required fields for Beneficial Owners:
            - **Sole Proprietorship**: Sole Owner (principal) - only 1 allowed
            - **Partnership, LLC, Privately Held Corporation**: Any owner with 25%+ ownership AND Controlling Authority
            - **Tax Exempt**: Controlling Authority only
            - **Government**: Controlling Authority only (Federal, State, Local)
            - **Publicly Traded Corporation**: Controlling Authority only
            - **Financial Institution**: Controlling Authority only
          enum:
            - Sole Proprietorship
            - Partnership
            - Limited Liability Company
            - Privately Held Corporation
            - Tax Exempt
            - Government
            - Publicly Traded Corporation
            - Financial Institution
        Years_at_Location__c:
          type: string
          description: Number of years at current location
          maxLength: 4
        Date_Established__c:
          type: string
          format: date
          description: Date business was established (YYYY-MM-DD)
        Chain_Non_Chain__c:
          type: string
          description: Chain classification (picklist)
          maxLength: 255
        Description:
          type: string
          description: Business description and operations
