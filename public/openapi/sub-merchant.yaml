            - Bank_City__c
            - Bank_State__c
            - Bank_Zipcode__c
            - Checking_Account__c
            - Transit_Routing__c
            - Years_Open__c
            - DDA_Type__c
          description: All bank account information is required. Only one account of each DDA type allowed per application.
        - name: Others
          fields:
            - Checking_Account_Unique_Field__c
          description: Unique identifier required when submitting multiple checking accounts in a single request

    Contact:
      type: object
      description: |
        Beneficial Owner / Contact information.
        
        **Contact Roles:**
        - **Owner (Ownership Prong)**: Individual with 25%+ equity interest
        - **Controlling Authority (Control Prong)**: Single individual managing the merchant (only one allowed)
        - **Signing Authority**: Can be owner or controlling authority
        - **Principal**: Combines owner and control prong
        
        **Validation Rules:**
        - Only one Control Prong allowed per application
        - Only one Authorized Signer allowed per application
        - Maximum 4 Principals allowed per application
        - Only 1 Principal allowed for Sole Proprietorship
        - Principal must own 25% or more
        - Sum of % Owned should not exceed 100%
        - % Owned not allowed for non-Principal roles
        
        **Required fields vary by Business Entity Type (Ownership on Account).**
      required:
        - attributes
        - FirstName
        - LastName
        - Email
        - Date_of_Birth__c
        - MailingStreet
        - MailingCity
        - MailingStateCode
        - MailingPostalCode
        - MailingCountryCode
        - SSN__c
        - Contact_Role__c
        - Percentage_Owned__c
        - Title
      properties:
        attributes:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - Contact
        FirstName:
          type: string
          description: Contact first name
          maxLength: 40
        LastName:
          type: string
          description: Contact last name
          maxLength: 80
        Title:
          type: string
          description: Contact title/position (e.g., CEO, CFO, President)
          maxLength: 128
        Phone:
          type: string
          description: Contact phone number (10 digits or (999) 999-9999 format)
          pattern: '^(\d{10}|\(\d{3}\) \d{3}-\d{4})$'
        Email:
          type: string
          format: email
          description: Contact email address
          maxLength: 80
        Date_of_Birth__c:
          type: string
          format: date
          description: Date of birth (YYYY-MM-DD)
        MailingStreet:
          type: string
          description: Mailing street address
          maxLength: 255
        MailingCity:
          type: string
          description: Mailing city
          maxLength: 40
        MailingStateCode:
          type: string
          description: Mailing state/province code
          maxLength: 80
        MailingPostalCode:
          type: string
          description: Mailing ZIP/Postal code
          maxLength: 20
        MailingCountryCode:
          type: string
          description: Mailing country code (picklist)
          maxLength: 10
        SSN__c:
          type: string
          description: Social Security Number (9 digits, no hyphens)
          maxLength: 9
          pattern: '^\d{9}$'
        Contact_Role__c:
          type: string
          description: |
            Contact role(s) - Multi-picklist. Multiple roles can be specified with semicolon separator.
            Values: Principal, Control Prong, Authorized Signer, etc.
          maxLength: 4099
        Percentage_Owned__c:
          type: number
          format: double
          description: |
            Percentage ownership. Required if Contact_Role__c includes "Principal".
            Must be 25% or greater for Principal role.
            Sum of all percentages cannot exceed 100%.
            Not allowed for non-Principal roles.
          minimum: 0
          maximum: 100
        Beneficial_Owner_Unique_Field__c:
          type: string
          description: Unique identifier for multiple contacts in same request. Used in response SourceId to identify which contact the response refers to.
      x-parameterGroups:
        - name: Required
          fields:
            - attributes
            - FirstName
            - LastName
            - Email
            - Date_of_Birth__c
            - MailingStreet
            - MailingCity
            - MailingStateCode
            - MailingPostalCode
            - MailingCountryCode
            - SSN__c
            - Contact_Role__c
            - Percentage_Owned__c
            - Title
          description: All contact information required. At least one Principal or Control Prong required based on business entity type.
        - name: Recommended
          fields:
            - Phone
          description: Contact phone number for verification and communication
        - name: Others
          fields:
            - Beneficial_Owner_Unique_Field__c
          description: Unique identifier required when submitting multiple beneficial owners in a single request

    ApplicationResponse:
      type: array
      description: |
        Array of response objects for each created/updated Salesforce record.

        **Response Fields:**
        - **SFId**: Salesforce ID of created/updated record (use for subsequent operations)
        - **SourceId**: For objects with multiple instances (Contact, Business Checking Account), returns the unique field value
        - **Success**: Boolean indicating success/failure
        - **ObjectType**: Type of Salesforce object
        - **Message**: Success or error message
      items:
        type: object
        required:
          - Success
          - ObjectType
          - Message
        x-parameterGroups:
          - name: Common
            fields:
              - Success
              - SFId
              - ObjectType
              - Message
          - name: When Provided
            fields:
              - SourceId
        properties:
          Success:
            type: boolean
            description: Indicates if the operation was successful
          SourceId:
            type: string
            nullable: true
            description: |
              Unique identifier for objects with multiple instances:
              - For Contact: value of Beneficial_Owner_Unique_Field__c
              - For Business Checking Account: value of Checking_Account_Unique_Field__c
              - null for single-instance objects
          SFId:
            type: string
            description: Salesforce ID of the created/updated record
            pattern: '^[a-zA-Z0-9]{15,18}$'
          ObjectType:
            type: string
            description: Type of Salesforce object
            enum:
              - Account
              - Opportunity
              - Contact
              - Business_Checking_Account__c
              - Quote
              - QuoteLineItem
          Message:
            type: string
            description: Success or error message

    AttachmentRequest:
      type: object
      required:
        - records
      x-parameterGroups:
        - name: Required
          fields:
            - records
      properties:
        records:
          type: array
          description: Array of attachment records to upload
          minItems: 1
          items:
            type: object
            required:
              - attributes
              - ParentId
              - Name
              - body
            properties:
              attributes:
                type: object
                required:
                  - type
                  - referenceId
                properties:
                  type:
                    type: string
                    enum:
                      - Attachment
                  referenceId:
                    type: string
                    description: Unique reference ID for this attachment in the request (e.g., "attachment0", "attachment1")
              ParentId:
                type: string
                description: Opportunity ID (SFID) to associate attachment with. Required field.
                pattern: '^[a-zA-Z0-9]{15,18}$'
              Name:
                type: string
                description: File name with extension (e.g., "File.pdf", "TestTXTFile.txt")
              body:
                type: string
                format: byte
                description: Base64-encoded file content (max 100 MB)

    AttachmentResponse:
      type: object
      required:
        - hasErrors
        - results
      x-parameterGroups:
        - name: Common
          fields:
            - hasErrors
            - results
      properties:
        hasErrors:
          type: boolean
          description: Indicates if any errors occurred during upload
        results:
          type: array
          items:
            type: object
            required:
              - referenceId
              - id
            properties:
              referenceId:
                type: string
                description: Reference ID from request (e.g., "attachment0")
              id:
                type: string
                description: Salesforce Attachment ID
                pattern: '^[a-zA-Z0-9]{15,18}$'

