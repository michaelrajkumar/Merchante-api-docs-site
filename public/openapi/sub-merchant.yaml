    Error:
      type: object
      required:
        - error
        - error_description
      properties:
        error:
          type: string
          description: Error code
        error_description:
          type: string
          description: Human-readable error description

    ValidationError:
      type: object
      description: |
        Validation error response. If any validation errors occur, the entire request is rejected and no information is saved.
      required:
        - Success
        - Message
      properties:
        Success:
          type: boolean
          enum:
            - false
        ObjectType:
          type: string
          description: Object that failed validation (Account, Contact, Business_Checking_Account__c, Opportunity, Quote, QuoteLineItem)
        Message:
          type: string
          description: |
            Detailed validation error message. Examples:
            - "Upsert failed. First exception on row 0; first error: REQUIRED_FIELD_MISSING, Required fields are missing: [Name]: [Name]"
            - "Phone/Fax number must be a 10-digit number or in (999) 999-9999 format."
            - "Federal Tax ID: Enter valid Federal Tax ID"
            - "In order to add a Beneficial Owner you must select an Entity Type on the Merchant Information page"
            - "Only one Control Prong Contact Roles allowed."
            - "% Owned: Principal owner must own 25% or more of the merchant"
        SourceId:
          type: string
          nullable: true

  responses:
    BadRequest:
      description: |
        Bad request - validation error or malformed request. 
        
        **Note:** If any validation errors occur, the entire request is rejected and no information is saved.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ValidationError'
              - type: array
                items:
                  $ref: '#/components/schemas/ValidationError'
          examples:
            accountNameMissing:
              summary: Account Name Required
              value:
                Success: false
                ObjectType: "Account"
                Message: "Upsert failed. First exception on row 0; first error: REQUIRED_FIELD_MISSING, Required fields are missing: [Name]: [Name]"
            invalidPhone:
              summary: Invalid Phone Format
              value:
                Success: false
                ObjectType: "Account"
                Message: "Upsert failed. First exception on row 0; first error: FIELD_CUSTOM_VALIDATION_EXCEPTION, Phone/Fax number must be a 10-digit number or in (999) 999-9999 format.: []"
            invalidTaxId:
              summary: Invalid Federal Tax ID
              value:
                Success: false
                ObjectType: "Account"
                Message: "Federal Tax ID: Enter valid Federal Tax ID"
            invalidAssociation:
              summary: Invalid Association ID
              value:
                Success: false
                ObjectType: "Account"
                Message: "3941803045 Association ID not found."
            duplicateDDAType:
              summary: Duplicate DDA Type
              value:
                Success: false
                ObjectType: "Business_Checking_Account__c"
                Message: "Only one Deposit Type account is allowed., Only one Chargeback Type account is allowed., Only one Fee Type account is allowed."
            invalidRoutingNumber:
              summary: Invalid Transit Routing Number
              value:
                Success: false
                ObjectType: "Business_Checking_Account__c"
                Message: "Upsert failed. First exception on row 0; first error: FIELD_CUSTOM_VALIDATION_EXCEPTION, Please enter a valid 9 digit number.: [Transit_Routing__c]"
            multipleControlProng:
              summary: Multiple Control Prong Not Allowed
              value:
                Success: false
                ObjectType: "Contact"
                Message: "Only one Control Prong Contact Roles allowed."
            ownershipPercentage:
              summary: Invalid Ownership Percentage
              value:
                Success: false
                ObjectType: "Contact"
                Message: "% Owned: Principal owner must own 25% or more of the merchant"

    Unauthorized:
      description: Unauthorized - invalid or expired token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "invalid_grant"
            error_description: "authentication failure"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errorCode:
                type: string
