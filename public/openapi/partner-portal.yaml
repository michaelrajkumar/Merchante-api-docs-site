      - $ref: '#/components/parameters/AuthorizationHeader'
      x-backend-path: /services/data/v54.0/composite/sobjects
    patch:
      summary: Update Application (Docs Alias)
      description: 'Documentation-friendly alias for updating an application.


        **Backend path:** `/services/data/v54.0/composite/sobjects` (Salesforce Composite SObject API).

        Use this alias in docs UIs to see a cleaner endpoint name; for direct Salesforce calls, use the backend path.'
