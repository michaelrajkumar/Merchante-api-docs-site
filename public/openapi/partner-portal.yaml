          - type
          properties:
            type:
              type: string
              enum:
              - Contact
        FirstName:
          type: string
          description: First name
          maxLength: 40
        LastName:
          type: string
          description: Last name (required)
          maxLength: 80
        Title:
          type: string
          description: Title (required)
          maxLength: 128
        Contact_Role__c:
          type: string
          description: 'Contact role (required) - multi-select picklist field. Separate multiple values with semicolons.


            Validation rules:

            - Only one "Control Owner" allowed per application

            - Maximum 4 "Beneficial Owner" contacts allowed per application

            - Only 1 "Beneficial Owner" allowed for Sole Proprietorship

            - Required fields vary based on Account Ownership type (see PDF pages 27-28)


            Valid values: "Beneficial Owner", "Control Owner", "Other"

            '
          example: Control Owner;Beneficial Owner
        Beneficial_Owner_Unique_Field__c:
          type: string
          description: Beneficial owner unique field (required for identifying multiple contacts in create/update requests)
          maxLength: 20
        Primary__c:
          type: boolean
          description: Is primary contact
        Percentage_Owned__c:
          type: number
          format: double
          description: 'Percentage owned - required if Contact Role includes "Beneficial Owner", must be >= 25% for Beneficial
            Owners.


            Validation errors:

            - "% Owned Principal owner must own 25% or more of the merchant" if < 25% for Beneficial Owner

            - "% Owned is not allowed for Non-Principal Contact Role" if specified for non-Beneficial Owner

            - Sum of all Beneficial Owner % Ownership must not exceed 100%

            '
          minimum: 0
          maximum: 100
        Date_of_Birth__c:
          type: string
          format: date
          description: Date of birth (required)
        SSN__c:
          type: string
          description: 'Social Security Number - must be 9 digits (required).


            Validation error if not exactly 9 digits.

            '
          pattern: ^\d{9}$
          maxLength: 9
      description: Identity and role fields for a contact/beneficial owner.
      required:
      - attributes
      - LastName
      - Title
      - Date_of_Birth__c
      - SSN__c
      - Contact_Role__c
      - Beneficial_Owner_Unique_Field__c
