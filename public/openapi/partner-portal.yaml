        fields: []
      - name: Others
        fields: []
    ApplicationResponse:
      type: object
      properties:
        Success:
          type: boolean
          description: Indicates if the data element was created/updated successfully (true/false)
        SourceId:
          type: string
          nullable: true
          description: 'Unique identifier for objects with multiple instances:

            - For Contact: returns value of Beneficial_Owner_Unique_Field__c

            - For Business Checking Account: returns value of Checking_Account_Unique_Field__c

            - For Quote Line Item (Equipment): returns value of Equipment_Unique_Field__c

            - Returns null for single-instance objects (Account, Opportunity, Quote)

            '
        SFId:
          type: string
          description: Unique Salesforce ID for the created/updated record
        ObjectType:
          type: string
          description: Type of data object being sent and received through the API
          enum:
          - Account
          - Opportunity
          - Contact
          - Business Checking Account
          - Quote
          - QuoteLineItem
        Message:
          type: string
          description: A string of text that indicates if a specific data object was created/updated successfully
          example: Merchant Information Created Successfully.
      x-parameterGroups:
      - name: Common
        fields:
        - Success
        - SFId
        - ObjectType
        - Message
      - name: When Provided
        fields:
        - SourceId
      - name: Other Fields
