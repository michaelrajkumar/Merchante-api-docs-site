openapi: 3.0.3
info:
  title: MerchantE Partner Portal API
  description: "The MerchantE Partner Portal API offers a streamlined process to pass merchant business information \n\
    related to a sales opportunity, a partial application, or a completed application to MerchantE. This API \nmodel is based\
    \ on the MerchantE application and the business information required to underwrite and \nonboard merchants with our company.\n\
    \nClients of this API are granted the ability to create, update, or delete Salesforce objects containing \nbusiness information\
    \ specific to an opportunity, directly from their own customer relationship management \nsystem. These objects are then\
    \ transposed to the Partner Portal in a viewable format, where they will \ndisplay data needed to onboard the account\
    \ so that the merchant may begin to process credit card \ntransactions.\n\n## Documentation\n- Technical documentation\
    \ and SDK libraries: https://developer.merchante.com\n- PCI Security Standards: https://www.pcisecuritystandards.org/\n\
    - NAICS lookup: https://www.census.gov/econ/isp/\n\n## Important Notes\n- The Merchant DBA Name is always required\n-\
    \ DDA Type is required when submitting checking account information\n- Entity Type, Last Name and Contact Role are required\
    \ when submitting contact information\n- Product Name is required when submitting equipment information\n- Updates to\
    \ applications in \"Pending Underwriting\" or \"Closed Won\" stages are not allowed\n\n## Object Hierarchy (payload structure)\n\
    - Account (Parent)\n- Opportunity (Child to Account)\n- Contact (Child to Account)\n- Business Checking Account (Child\
    \ to Account)\n- Quote (Grandchild to Account and Child to Opportunity)\n- Quote Line Item (Greatgrandchild to Account\
    \ and Grandchild to Opportunity)\n\n**Portal-optimized build:** adds request field grouping (Required/Recommended/Others),\
    \ update payload schemas requiring `id`, per-action response examples aligned to the March 2024 PDF, and hides raw Salesforce\
    \ endpoints under an internal tag."
  version: 3.5-portal-optimized-v1.2
  contact:
    name: MerchantE Partner Support
    url: https://www.merchante.com
  license:
    name: Proprietary
    url: https://www.merchante.com
servers:
- url: https://test.salesforce.com
  description: Test server
security:
- OAuth2: []
paths:
  /services/oauth2/token:
    post:
      summary: Get Authentication Token
      description: 'Generate an OAuth 2.0 access token for API authentication.


        **Note**: Auth token is valid for 24 hours.

        '
      operationId: getAuthToken
      tags:
      - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - grant_type
              - client_id
              - client_secret
              - username
              - password
              properties:
                grant_type:
                  type: string
                  enum:
                  - password
                  description: Literal "password" text
                client_id:
                  type: string
                  description: Different for each sandbox/org (provided by SE)
                client_secret:
                  type: string
                  description: Different for each sandbox/org (provided by SE)
                username:
                  type: string
                  example: partnerportalapi@merchante.com.cert
                  description: Different for each sandbox/org
                password:
                  type: string
                  description: Password + Security Token (provided by secure email). Security Token is not always required
                    depending on the org configuration
              x-parameterGroups:
              - name: Required
                fields:
                - grant_type
                - client_id
                - client_secret
                - username
                - password
              - name: Recommended
                fields: []
              - name: Others
                fields: []
            examples:
              passwordGrant:
                summary: passwordGrant
                value:
                  grant_type: password
                  client_id: YOUR_CLIENT_ID
                  client_secret: YOUR_CLIENT_SECRET
                  username: YOUR_USERNAME
                  password: YOUR_PASSWORD
      responses:
        '200':
          description: 'Successful authentication. Returns an OAuth 2.0 access token valid for 24 hours.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: OAuth 2.0 access token (valid for 24 hours)
                  instance_url:
                    type: string
                  id:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  issued_at:
                    type: string
                  signature:
                    type: string
                x-parameterGroups:
                - name: Common
                  fields:
                  - access_token
                  - instance_url
                  - token_type
                - name: When Provided
                  fields:
                  - id
                  - issued_at
                  - signature
                - name: Other Fields
                  fields: []
              examples:
                tokenResponse:
                  summary: Successful authentication response
                  description: OAuth 2.0 access token with 24-hour validity
                  value:
                    access_token: 00Dxx0000000000!AQ0AQMxKzI5ODU3NzQ3NDI5OjE3MTAwMDAwMDAwMDA6cjo6OkFRRUFJUUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQQ
                    instance_url: https://merchante-solutions.my.salesforce.com
                    id: https://login.salesforce.com/id/00Dxx0000000000/005xx0000000000
                    token_type: Bearer
                    issued_at: '1710000000000'
                    signature: 0Cmx9lKp3hA9FJCz8V2TZxF6q8Y5bH3xZ1pN4mK7sR9dQ6wE2tL8jF3vN5cX0aB1
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /services/data/v54.0/composite/sobjects:
    post:
      summary: '[Internal] Create Merchant Application'
      description: "Creates a new merchant application with all related objects including Account, Opportunity, \nContacts\
        \ (Beneficial Owners), Business Checking Accounts, Quote, and Quote Line Items.\n\n**Required Information**:\n- The\
        \ Merchant DBA Name is always required\n- DDA Type is required when submitting checking account information\n- Entity\
        \ Type, Last Name and Contact Role are required when submitting contact information\n- Product Name is required when\
        \ submitting equipment information\n\n**Business Rules**:\n- At least one Primary Contact/Beneficial Owner must be\
        \ identified\n- Only one Control Owner is allowed per application\n- Only one Authorized Signer is allowed per application\n\
        - Maximum 4 Beneficial Owners are allowed per application\n- Only 1 Beneficial Owner is allowed for Sole Proprietorship\n\
        - Sum of % Ownership for all Beneficial Owners must not exceed 100%\n"
      operationId: createApplication
      tags:
      - Salesforce (internal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
            examples:
              minimalCreateApplication:
                summary: minimalCreateApplication
                value:
                  Opp:
                    attributes:
                      type: Opportunity
                    BET_Table_ID_API_Field__c: string
                    Yearly_Net_Revenue__c: 1
                    Visa_MC_Discover_Volume__c: 1
                    Merchant_Application_Notes__c: string
                  Mer:
                    attributes:
                      type: Account
                    Name: string
                    Legal_Name__c: string
                    Tax_ID__c: string
                    State_of_Entity_Formation_Incorporation__c: string
                    BillingStreet: string
                    BillingCity: string
                    BillingStateCode: string
                    BillingPostalCode: string
                    BillingCountryCode: string
                    ShippingStreet: string
                    ShippingCity: string
                    Phone: string
                    App_Email__c: test@example.com
                    Customer_Service_Phone__c: string
                    Ownership: Sole Proprietorship
                    Industry: Retail
                    Location_Type__c: Ecommerce
                    Years_at_Location__c: string
                    Date_Established__c: '2000-01-01'
                    Chain_Non_Chain__c: Single Outlet
                    Description: string
                    MCC_API_Field__c: string
                    Sponsorship__c: Wells Fargo
      responses:
        '200':
          description: Application created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationResponse'
              examples:
                createApplicationResponse:
                  summary: createApplicationResponse
                  value: &id001
                  - Success: true
                    SourceId: null
                    SFId: 0011800000YkI5NAAV
                    ObjectType: Account
                    Message: Merchant Information Created Successfully.
                  - Success: true
                    SourceId: '111'
                    SFId: 0031800000SwFDOAA3
                    ObjectType: Contact
                    Message: Beneficial Owner Created Successfully.
                  - Success: true
                    SourceId: '222'
                    SFId: 0031800000SwFDPAA3
                    ObjectType: Contact
                    Message: Beneficial Owner Created Successfully.
                  - Success: true
                    SourceId: '111'
                    SFId: a3h18000000blAWAAY
                    ObjectType: Business Checking Account
                    Message: Business Checking Account Created Successfully.
                  - Success: true
                    SourceId: '222'
                    SFId: a3h18000000blAXAAY
                    ObjectType: Business Checking Account
                    Message: Business Checking Account Created Successfully.
                  - Success: true
                    SourceId: null
                    SFId: 00618000006PCkHAAW
                    ObjectType: Opportunity
                    Message: Transaction/Payment Options Created Successfully.
                  - Success: true
                    SourceId: null
                    SFId: 0Q01800000020nxCAA
                    ObjectType: Quote
                    Message: Record Created Successfully.
                  - Success: true
                    SourceId: null
                    SFId: 0QL1800000028mnGAA
                    ObjectType: QuoteLineItem
                    Message: Solution & Fees Created Successfully.
                  - Success: true
                    SourceId: '111'
                    SFId: 0QL1800000028moGAA
                    ObjectType: QuoteLineItem
                    Message: Equipment Created Successfully.
                  - Success: true
                    SourceId: '222'
                    SFId: 0QL1800000028mpGAA
                    ObjectType: QuoteLineItem
                    Message: Equipment Created Successfully.
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      x-internal: true
    patch:
      summary: '[Internal] Update Merchant Application'
      description: 'Updates an existing merchant application and its related objects.


        **Important Notes**:

        - The "id" field represents the SFId of the ObjectType being updated

        - Include the Opportunity SFID for Update requests

        - Source ID can be used to relate SFID to the corresponding fields provided

        - Updates to applications in "Pending Underwriting" or "Closed Won" stages are not allowed

        '
      operationId: updateApplication
      tags:
      - Salesforce (internal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationRequest'
            examples:
              minimalUpdateApplication:
                summary: minimalUpdateApplication
                value:
                  Opp: null
                  Mer: null
      responses:
        '200':
          description: Application updated successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationResponse'
              examples:
                updateApplicationResponse:
                  summary: updateApplicationResponse
                  value: &id002
                  - Success: true
                    SourceId: null
                    SFId: 0011800000YkI5NAAV
                    ObjectType: Account
                    Message: Merchant Information Updated Successfully.
                  - Success: true
                    SourceId: '111'
                    SFId: 0031800000SwFDOAA3
                    ObjectType: Contact
                    Message: Beneficial Owner Updated Successfully.
                  - Success: true
                    SourceId: '222'
                    SFId: 0031800000SwFDPAA3
                    ObjectType: Contact
                    Message: Beneficial Owner Updated Successfully.
                  - Success: true
                    SourceId: '111'
                    SFId: a3h18000000blAWAAY
                    ObjectType: Business Checking Account
                    Message: Business Checking Account Updated Successfully.
                  - Success: true
                    SourceId: '222'
                    SFId: a3h18000000blAXAAY
                    ObjectType: Business Checking Account
                    Message: Business Checking Account Updated Successfully.
                  - Success: true
                    SourceId: null
                    SFId: 00618000006PCkHAAW
                    ObjectType: Opportunity
                    Message: Transaction/Payment Options Updated Successfully.
                  - Success: true
                    SourceId: null
                    SFId: 0Q01800000020nxCAA
                    ObjectType: Quote
                    Message: Record Updated Successfully.
                  - Success: true
                    SourceId: null
                    SFId: 0QL1800000028mnGAA
                    ObjectType: QuoteLineItem
                    Message: Solution & Fees Updated Successfully.
                  - Success: true
                    SourceId: '111'
                    SFId: 0QL1800000028moGAA
                    ObjectType: QuoteLineItem
                    Message: Equipment Updated Successfully.
                  - Success: true
                    SourceId: '222'
                    SFId: 0QL1800000028mpGAA
                    ObjectType: QuoteLineItem
                    Message: Equipment Updated Successfully.
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      x-internal: true
