          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      x-backend-path: /services/data/v54.0/composite/sobjects
  /applications/attachments:
