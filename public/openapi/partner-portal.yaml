  /applications/{opportunityId}:
    get:
      summary: Get Application Opportunity
      description: 'Retrieve opportunity details for a specific application by Opportunity ID.


        Returns the Opportunity record including submission details, volumes, business model, programs, channels, and other application-level fields.


        **Backend path:** `/services/data/v54.0/sobjects/Opportunity/{opportunityId}`.'
      operationId: getOpportunityAlias
      x-parameterGroups:
        - name: Required
          fields:
            - Authorization
            - opportunityId
      tags:
      - Lookup
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      - name: opportunityId
        in: path
        required: true
        description: The SFId value associated with the ObjectType Opportunity
        schema:
          type: string
      responses:
        '200':
          description: Opportunity details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Opportunity'
        '404':
          description: Opportunity not found
      x-backend-path: /services/data/v54.0/sobjects/Opportunity/{opportunityId}
  /applications/{opportunityId}/account:
    get:
      summary: Get Account
      description: 'Retrieve the merchant account (Account object) associated with a specific application.


        Returns the Account record including merchant identity, legal/DBA addresses, contact information, business profile, and processing history.


        **Backend path:** `/services/data/v54.0/sobjects/Opportunity/{opportunityId}/Account`.'
      operationId: getAccountAlias
      x-parameterGroups:
        - name: Required
          fields:
            - Authorization
            - opportunityId
      tags:
      - Lookup
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      - name: opportunityId
        in: path
        required: true
        description: The Salesforce ID (SFId) of the Opportunity record
        schema:
          type: string
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
      x-backend-path: /services/data/v54.0/sobjects/Opportunity/{opportunityId}/Account
  /applications/{opportunityId}/contacts:
    get:
      summary: Get Contacts
      description: 'Retrieve all contacts (beneficial owners) associated with a specific application.


        Returns a list of Contact records including principals, control owners, authorized signers, and beneficial owners with their personal information, ownership percentages, and roles.


        **Backend path:** `/services/data/v54.0/sobjects/Opportunity/{opportunityId}/Account/Contacts`.'
      operationId: getContactsAlias
      x-parameterGroups:
        - name: Required
          fields:
            - Authorization
            - opportunityId
      tags:
      - Lookup
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      - name: opportunityId
        in: path
        required: true
        description: The Salesforce ID (SFId) of the Opportunity record
        schema:
          type: string
      responses:
        '200':
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
