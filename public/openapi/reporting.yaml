openapi: 3.0.3
info:
  title: MerchantE Reporting API
  description: |
    The MerchantE platform provides a robust variety of reports to assist in reconciliation of card and ACH 
    transactions. In addition to providing reports via the web, an API servlet is available for users that 
    prefer to download the data into their own system in CSV format. An additional option to download data 
    in XML format is also available.
    
    To initiate a request, users must provide a valid user name and password with the rights necessary to use 
    the reporting API and access the requested report. Although several reports are available via the API, only 
    reports enabled for that user name will be accessible.
    
    ## Available Reports
    
    | Report ID | Report Name | Description |
    |-----------|-------------|-------------|
    | 1 | Batch Summary | Pre-settlement card totals by date and batch |
    | 2 | Settlement Summary | Settled transactions to merchant's bank |
    | 3 | Deposit Summary | ACH entries to merchant's account |
    | 5 | Chargeback Adjustments | Individual chargebacks with status |
    | 7 | Retrieval Requests | Retrieval request tracking |
    | 8 | Daily Interchange | Interchange qualification categories |
    | 9 | Custom Queries | Visa/MC/Discover ARDEF tables |
    | 10 | FX Batch Summary | International FX transactions |
    | 12 | International Retrieval Requests | International retrieval tracking |
    | 13 | FX Interchange Summary | FX interchange rates |
    | 14 | International Settlement Summary | Settled international transactions |
    | 15 | Authorization Log | Real-time authorization attempts |
    | 21 | Payment Gateway Unsettled | Pending settlement transactions |
    | 22 | Payment Gateway Settled | Settled gateway transactions |
    | 23 | Payment Gateway Rejected | Declined transactions |
    
    ## Custom Queries
    
    | Query ID | Query Name | Description |
    |----------|------------|-------------|
    | 283 | Visa ARDEF Table | Current Visa account range definition table |
    | 284 | MasterCard ARDEF Table | Current MasterCard account range definition table |
    | 286 | Discover ARDEF Data | Current Discover account range definition table |
    
    ## Response Formats
    
    Reports can be returned in CSV (default) or XML format. Use the `xmlEncoding` parameter to specify XML output.
    
    ## Document Revisions
    
    - **March 2024**: Current version
    - **April 2023**: Switched to monthly update, updated API Specification template
    - **November 2022**: Added Digital Wallet to Settlement Detail, Batch Detail, and Authorization Log Detail reports
    - **May 2022**: Removed Payvision reports, added KeyBank to copyright statement
    - **December 2021**: Completed rebranding, updated for consistent formatting
    - **July 2018**: Added Discover ARDEF custom query, updated Visa ARDEF field values
    - **April 2018**: Updated Chargeback and retrieval reason codes with Visa VCR codes
    
