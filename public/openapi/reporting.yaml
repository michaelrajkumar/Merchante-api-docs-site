        - K^: Visa Corporate T&E
        - K1: Visa GSA Corporate T&E
        - L^: Electron
        - M^: MasterCard/Euro Card and Diners
        - N^: Visa Platinum
        - N1: Visa Rewards
        - N2: Visa Select
        - O^: Reserved
        - P^: Visa Gold
        - Q^: Private Label
        - Q2: Private Level Basic
        - Q3: Private Level Standard
        - Q4: Private Level Enhanced
        - Q5: Private Label Specialized
        - Q6: Private Level Premium
        - R^: Proprietary
        - S^: Visa Purchasing
        - S1: Visa Purchasing with Fleet
        - S2: Visa GSA Purchasing
        - S3: Visa GSA Purchasing with Fleet
        - S4: Commercial Agriculture
        - S5: Commercial Transport EBT
        - S6: Commercial Marketplace
        - U^: Visa Travel Money
        - V^: V Pay
        - Spaces: Unspecified
      example: "A^"

    FundingSourceEnum:
      type: string
      enum: ["C", "D", "P", "H", "R"]
      description: |
        Funding Source:
        - C: Credit
        - D: Debit
        - P: Prepaid
        - H: Charge
        - R: Deferred Debit
      example: "C"

    # =========================================================================
    # CUSTOM QUERY - MASTERCARD ARDEF SCHEMAS
    # =========================================================================

    MastercardArdefResponse:
      type: object
      description: MasterCard ARDEF Custom Query response fields
      properties:
        effectiveDate:
          type: string
          format: date
          description: Date and time that the information in this record becomes effective or was last updated
          example: "04/11/2012"
        rangeLow:
          type: string
          description: The low range ARDEF value
          example: "3600000000000000000"
        rangeHigh:
          type: string
          description: The high range ARDEF value
          example: "3612339999999999999"
        issuerCountry:
          type: string
          maxLength: 3
          description: Country of Issuer BIN (MasterCard 3-character code)
          example: "CHL"
        cardProgramId:
          $ref: '#/components/schemas/CardProgramIdEnum'
        gcmsProductId:
          type: string
          maxLength: 3
          description: |
            Identifies the product recognized by the GCMS for the combination of issuer 
            account range and Card Program Identifier. This is a top-level hierarchy; 
            Licensed_Product_Id should be used when identifying primary card characteristics.
          example: "MCC"
        licensedProductId:
          type: string
          maxLength: 3
          description: |
            Identifies the actual product code assigned by MasterCard when licensing the 
            combination of issuer account range and Card Program Identifier. This field 
            should be used as primary means to identify card characteristics.
          example: "MCC"
        productTypeId:
          type: string
          enum: ["1", "2", "3"]
          description: |
            The product type of the associated account range and card program identifier:
            - 1: Consumer
            - 2: Commercial
            - 3: Both
          example: "1"
        accountLevelInd:
          type: string
          enum: ["N", "Y"]
          description: |
            Account Level Processing indicator:
            - N: No cardholder accounts within range are participants in Account Level Processing or Co-Brand Proprietary Card Program
            - Y: Some cardholder accounts within range are participants in Account Level Processing or Co-Brand Proprietary Card Program
          example: "N"
        accountLevelDate:
          type: string
          format: date
          description: The account level activation date (yymmdd)
          example: "11/30/1999"

    CardProgramIdEnum:
      type: string
      enum: ["CIR", "DMC", "MCC", "MSI", "PRO", "PVL", "SOL", "SWI", ""]
      description: |
        Three-character code that identifies the card program or financial network:
        - CIR: Cirrus®
        - DMC: Debit MasterCard®
        - MCC: MasterCard® Credit
        - MSI: Maestro®
        - PRO: Sweden domestic brand
        - PVL: Private label
        - SOL: U.K. domestic Solo brand (Pre-edit system only)
        - SWI: U.K. domestic Switch brand (Pre-edit system only)
        - Spaces: Members must submit all spaces unless specifically directed otherwise
      example: "MCC"

    # =========================================================================
    # CUSTOM QUERY - DISCOVER ARDEF SCHEMAS
    # =========================================================================

    DiscoverArdefResponse:
      type: object
      description: Discover ARDEF Custom Query response fields
      properties:
        effectiveDate:
          type: string
          format: date
          description: Date and time that the information in this record becomes effective or was last updated
          example: "04/11/2012"
        prefix:
          type: string
          description: IIN (Prefix) Number
          example: "601100"
        prefixLength:
          type: string
          description: IIN Prefix Length (00 through 19)
          example: "06"
        lengthMin:
          type: string
          description: Minimum PAN Length (00 through 19)
          example: "16"
        lengthMax:
          type: string
          description: Maximum PAN Length (00 through 19)
          example: "16"
        issuerCountry:
          type: string
          description: ISO country code value
          example: "US"
        cardProductId:
          $ref: '#/components/schemas/DiscoverCardProductIdEnum'
        foreignCardInd:
          type: string
          enum: ["0", "1"]
          description: |
            Indicates country of issuance:
            - 0: U.S.
            - 1: Outside of the U.S.
          example: "0"
        accountLevelInd:
          type: string
          enum: ["0", "1"]
          description: |
            Indicates if this IIN range has account level processing enabled:
            - 0: No
            - 1: Yes
          example: "0"

    DiscoverCardProductIdEnum:
      type: string
      enum: ["001", "002", "003", "004", "005", "006", "007", "008", "009", "010", "011", "012", "013", "014"]
      description: |
        Discover Card Product ID:
        - 001: Consumer Credit-Rewards
        - 002: Commercial Credit
        - 003: Consumer Debit
        - 004: Commercial Debit
        - 005: Prepaid Gift
        - 006: Prepaid ID Known
        - 007: Consumer Credit - Premium
        - 008: Consumer Credit - Core
        - 009: Private Label Credit Card
        - 010: Commercial Credit - Executive Business
        - 011: Consumer Credit - Premium Plus
        - 012: Commercial Prepaid - Non-Reloadable
        - 013: PayPal Payment Card
        - 014: PayPal Mobile In-Store Payment: Payment Code
      example: "001"

    # =========================================================================
    # CARD TYPE CODES
    # =========================================================================

    CardTypeCodeEnum:
      type: string
      enum: ["VS", "MC", "DS", "AM", "DN", "JC", "DB"]
      description: |
        Card Type brand codes:
        - VS: Visa
        - MC: MasterCard
        - DS: Discover
        - AM: American Express
        - DN: Diners Club
        - JC: JCB
        - DB: Debit/EBT
      example: "VS"

    # =========================================================================
    # ENTRY MODE CODES
    # =========================================================================

    EntryModeEnum:
      type: string
      enum: ["KEYED", "SWIPED", "CHIP", "CONTACTLESS", "ECOMMERCE"]
      description: |
        Method of Card Number Entry:
        - KEYED: Manually entered
        - SWIPED: Magnetic stripe
        - CHIP: EMV chip
        - CONTACTLESS: NFC/contactless
        - ECOMMERCE: Online/e-commerce
      example: "KEYED"

    # =========================================================================
    # CHARGEBACK REASON CODES
    # =========================================================================

    ChargebackReasonCode:
      type: object
      description: Chargeback reason code mapping across card networks
      properties:
        description:
          type: string
          description: Description of the chargeback reason
        visaCode:
          type: string
          description: Visa reason code
        mastercardCode:
          type: string
          description: MasterCard reason code
        discoverCode:
          type: string
          description: Discover reason code
        amexCode:
          type: string
          description: American Express reason code

    # =========================================================================
    # VCR (VISA CLAIMS RESOLUTION) CHARGEBACK CODES
    # =========================================================================

    VcrChargebackCode:
      type: object
      description: Visa Claims Resolution (VCR) chargeback codes
      properties:
        code:
          type: string
          description: VCR dispute condition code
          example: "10.1"
        description:
          type: string
          description: Description of the dispute condition
          example: "EMV Liability Shift Counterfeit Fraud"

    # =========================================================================
    # RETRIEVAL REASON CODES
    # =========================================================================

    RetrievalReasonCode:
      type: object
      description: Retrieval request reason code mapping across card networks
      properties:
        description:
          type: string
          description: Description of the retrieval reason
        visaCode:
          type: string
          description: Visa reason code
        mastercardCode:
          type: string
          description: MasterCard reason code
        discoverCode:
          type: string
          description: Discover reason code
        amexCode:
          type: string
          description: American Express reason code

    # =========================================================================
    # ERROR RESPONSE
    # =========================================================================

    ErrorResponse:
      type: object
      properties:
        errorCode:
          type: string
          description: Error code
        errorMessage:
          type: string
          description: Human-readable error message
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the error

  securitySchemes:
    formAuth:
      type: apiKey
      in: query
      name: userId
      description: |
        Authentication is performed via form parameters:
        - `userId`: User Login ID for the ME web reporting system
        - `userPass`: User Login Password for the ME web reporting system
        
        Both parameters must be included in every request body.

security:
  - formAuth: []
